name: Create Github Release

on:
  workflow_call:
    inputs:
      release-notes:
        description: Release notes to add to the release
        type: string
        default: ""

jobs:
  check-library-properties:
    name: Check if library.properties exists
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f library.properties ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  check-properties-version:
    name: Check library properties version
    needs: check-library-properties
    if: needs.check-library-properties.outputs.exists == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          PROP_VERSION=$(grep "version" library.properties | cut -d'=' -f2)
          if [ "${{ github.ref_name }}" != "$PROP_VERSION" ]; then
            echo "::error::Version mismatch! library.properties version $PROP_VERSION does not match tag ${{ github.ref_name }}"
            exit 1
          fi

  create-github-release:
    runs-on: ubuntu-latest
    needs: [check-library-properties, check-properties-version]
    if: |
      !cancelled() &&
      needs.check-library-properties.result == 'success' &&
      (needs.check-properties-version.result == 'success' || needs.check-properties-version.result == 'skipped')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "$(gh release view '${{ github.ref_name }}' 2>&1)" == "release not found" ]]; then
            gh release create '${{ github.ref_name }}' --repo '${{ github.repository }}' --notes "${{ inputs.release-notes }}"
          fi
      - name: Upload metadata.yml to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Upload metadata.yml to GitHub Release using the `gh` CLI.
        run: >-
          gh release upload
          '${{ github.ref_name }}' metadata.yml
          --repo '${{ github.repository }}'

  create-driver-index-release:
    needs: create-github-release
    if: |
      !cancelled() &&
      needs.create-github-release.result == 'success'
    uses: sensirion/.github/.github/workflows/driver_index.common.create_release.yml@main
    secrets:
      DI_BASIC_AUTH_TOKEN: ${{ secrets.DI_BASIC_AUTH_TOKEN }}
    with:
      DI_BASE_URL: ${{ vars.DI_BASE_URL }}
